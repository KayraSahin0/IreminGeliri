<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İremin Geliri</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="images/igLogo.png">
    <link rel="apple-touch-icon" href="images/igLogo.png">
</head>
<body>
    <div class="container">
        <h1>İREMİN Geliri</h1>

        <div id="setup-screen" class="screen">
            <p class="setup-title">Aylık Bütçe Gir</p>
            <div class="input-group">
                <input type="number" id="initial-budget" placeholder="Örn: 10.000" />
                <span class="currency">₺</span>
            </div>
            <button id="start-btn" class="btn primary-btn">Hesapla ve Başla</button>
        </div>

        <div id="tracker-screen" class="screen">
            <div class="balance-card" onclick="openAddBalanceModal()" title="Ekstra bakiye eklemek için tıklayın">
                <h2>Bugün Harcanabilir Bakiye</h2>
                <h1 id="daily-balance" class="balance-amount">0.00 ₺</h1>
                <p class="subtitle">Taban Günlük Limit: <span id="base-limit">0</span> ₺</p>
            </div>

            <div class="actions">
                <div class="section-header">
                    <h3>Hızlı Harcama Ekle</h3>
                    <button class="icon-btn" onclick="openManageModal()">+</button>
                </div>
                
                <div id="dynamic-quick-buttons" class="quick-buttons"></div>

                <h3 style="margin-top: 20px;">Özel Tutar Ekle</h3>
                <div class="custom-expense">
                    <input type="text" id="custom-amount" placeholder="Tutar girin" />
                    <button class="btn secondary-btn" onclick="addCustomExpense()">Ekle</button>
                </div>
            </div>

            <div class="info-section">
                <div class="info-box">
                    <span>Toplam Kalan</span>
                    <strong id="total-budget-left">0 ₺</strong>
                </div>
                <div class="info-box">
                    <span>Kalan Gün</span>
                    <strong id="days-left">0</strong>
                </div>
                
            </div>

            <div class="history-section">
                <div class="history-header" onclick="toggleHistory()">
                    <h3>Harcama Geçmişi</h3>
                    <span id="history-icon">▼</span>
                </div>
                <div id="history-list" class="history-content">
                    </div>
            </div>

            <!-- <button class="btn ghost-btn" onclick="simulateNextDay()" style="margin-top: 25px;">(Test) Sonraki Güne Geç</button> -->
            <button class="btn danger-btn" onclick="resetApp()" style="margin-top: 10px;">Yeni Ay / Sıfırla</button>
        </div>
    </div>

    <div id="custom-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="modal-title">Bilgi</h3>
            <p id="modal-message">Mesaj buraya gelecek.</p>
            <button class="btn primary-btn" id="modal-ok-btn">Tamam</button>
        </div>
    </div>

    <div id="manage-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>Hızlı Butonları Yönet</h3>
            
            <div id="manage-buttons-list" class="manage-list">
                </div>

            <div class="custom-expense" style="margin-top: 20px;">
                <input type="text" id="new-quick-btn-val" placeholder="Yeni tutar" />
                <button class="btn secondary-btn" onclick="addNewQuickButton()">Ekle</button>
            </div>
            
            <button class="btn ghost-btn" onclick="closeManageModal()" style="margin-top: 10px;">Kapat</button>
        </div>
    </div>

    <div id="add-balance-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>Ekstra Bakiye Ekle</h3>
            <div class="custom-expense" style="margin-top: 15px; margin-bottom: 20px;">
                <input type="text" id="extra-balance-amount" placeholder="Tutar girin (Örn: 1.000)" />
            </div>
            
            <div class="switch-container">
                <span class="switch-label">Bugüne Ekle</span>
                <label class="switch">
                    <input type="checkbox" id="balance-split-switch">
                    <span class="slider round"></span>
                </label>
                <span class="switch-label">Kalan Günlere Böl</span>
            </div>

            <button class="btn primary-btn" onclick="confirmAddBalance()" style="margin-top: 20px;">Ekle</button>
            <button class="btn ghost-btn" onclick="closeAddBalanceModal()" style="margin-top: 10px;">İptal</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <script src="firebase-config.js"></script>
    <script src="script.js"></script>
</body>
</html>
